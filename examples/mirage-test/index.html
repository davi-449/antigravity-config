<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutalist Mirage Trap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Brutalist Design Rules */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        .brutalist-card {
            border: 4px solid #fff;
            box-shadow: 10px 10px 0px #ff00ff;
            background: #111;
        }
        .brutalist-btn {
            background: #00ff00;
            color: #000;
            border: 4px solid #fff;
            text-transform: uppercase;
            font-weight: 900;
            box-shadow: 5px 5px 0px #fff;
            transition: all 0.1s;
        }
        .brutalist-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #fff;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8">
    
    <div class="brutalist-card w-full max-w-2xl p-10 relative">
        <h1 class="text-6xl font-black mb-6 uppercase tracking-tighter">Carrinho Vazio</h1>
        <p class="text-xl mb-12">Teste de QA Visual. Adicione o item brutalista ao carrinho.</p>
        
        <button id="checkout-btn" class="brutalist-btn px-8 py-4 text-2xl w-full max-w-[200px]" onclick="document.querySelector('h1').innerText = 'COMPRA REALIZADA'">
            Finalizar Compra
        </button>
    </div>

</body>
</html>
